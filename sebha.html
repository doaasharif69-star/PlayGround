      <nav class="top-nav">

        </div>
      </nav>
      <div class="sub-hero-content">
        <div>
          <p class="eyebrow">ذكر مريح وسريع</p>
          <h1>سبحة إلكترونية لتسبيح أي ذكر تريدينه</h1>
          <p class="hero-text">اختاري الذكر الجاهز أو اكتبيه بنفسك، ثم ابدئي العد بسهولة.</p>
        </div>
      </div>
    </header>

    <main class="sebha-layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="mini-title">الذكر الحالي</p>
            <h2>السبحة الإلكترونية</h2>
          </div>
        </div>
        <div class="sebha-controls">
          <select id="sebha-presets">
            <option value="سبحان الله">سبحان الله</option>
            <option value="الحمد لله">الحمد لله</option>
            <option value="الله أكبر">الله أكبر</option>
            <option value="لا إله إلا الله">لا إله إلا الله</option>
            <option value="أستغفر الله">أستغفر الله</option>
          </select>
          <input id="sebha-custom-text" type="text" placeholder="أو اكتبي ذكرًا مخصصًا">
          <input id="sebha-target" type="number" min="1" value="33" placeholder="الهدف">
        </div>
        <div class="sebha-display">
          <p id="sebha-current-text">سبحان الله</p>
          <strong id="sebha-counter">0</strong>
          <span id="sebha-target-text">من 33</span>
        </div>
        <div class="timer-actions">
          <button class="primary-btn" id="sebha-count-btn" type="button">تسبيحة</button>
          <button class="ghost-btn" id="sebha-reset-btn" type="button">إعادة</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
